name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run abc.py
        run: python abc.py